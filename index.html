<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Anime</title>
  <meta name="theme-color" content="#1c1b1f" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <style>
    /* ── MD3 dark color tokens ── */
    :root {
      --bg:            #1c1b1f;
      --surface:       #1c1b1f;
      --surf-c:        #211f26;
      --surf-ch:       #2b2930;
      --surf-chh:      #36343b;
      --primary:       #d0bcff;
      --on-primary:    #381e72;
      --primary-c:     #4f378b;
      --on-primary-c:  #eaddff;
      --on-surface:    #e6e1e5;
      --on-surf-var:   #cac4d0;
      --outline:       #938f99;
      --outline-var:   #49454f;
      --error:         #f2b8b5;
      --error-c:       #601410;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--on-surface);
      font-family: 'Roboto', system-ui, -apple-system, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── Top App Bar ── */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
      height: 64px;
      background: var(--surf-c);
      display: flex;
      align-items: center;
      padding: 0 4px 0 16px;
      gap: 4px;
    }
    .top-bar-title {
      flex: 1;
      font-size: 1.375rem;
      font-weight: 400;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .icon-btn {
      position: relative;
      width: 48px; height: 48px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--on-surf-var);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background .2s;
    }
    .icon-btn:active { background: rgba(202,196,208,.12); }
    .server-dot {
      position: absolute;
      top: 9px; right: 9px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--primary-c);
      color: var(--primary);
      font-size: .55rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Error bar ── */
    .error-bar {
      flex-shrink: 0;
      background: var(--error-c);
      color: var(--error);
      padding: 10px 16px;
      font-size: .875rem;
      letter-spacing: .25px;
      display: none;
    }

    /* ── Scroll area ── */
    .scroll-area {
      flex: 1;
      min-width: 0;
    }

    /* ── Player ── */
    .player-wrap {
      width: 100%;
      height: 56vw;
      min-height: 200px;
      max-height: 480px;
      background: #000;
      position: relative;
      overflow: hidden;
    }
    .player-wrap iframe,
    .player-wrap video,
    .player-wrap .player-placeholder {
      width: 100%;
      height: 100%;
      border: none;
    }
    .player-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--surf-ch);
      color: var(--on-surf-var);
    }
    .play-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--surf-chh);
      display: flex; align-items: center; justify-content: center;
    }
    .player-placeholder p { font-size: .875rem; letter-spacing: .25px; }

    /* ── Meta bar ── */
    .meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surf-c);
    }
    .meta-label {
      font-size: .75rem;
      color: var(--on-surf-var);
      letter-spacing: .4px;
    }
    .meta-ep {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: .15px;
      margin-top: 2px;
      min-height: 1.4em;
    }
    .resume-chip {
      flex-shrink: 0;
      background: var(--primary-c);
      color: var(--primary);
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 8px;
    }

    /* ── Chips row ── */
    .chips-row {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--surf-c);
      border-top: 1px solid rgba(255,255,255,.04);
    }
    .chips-row::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      height: 32px;
      padding: 0 16px;
      border-radius: 8px;
      border: 1px solid var(--outline-var);
      background: transparent;
      color: var(--on-surf-var);
      font-size: .875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s, color .15s, border-color .15s;
    }
    .chip.active {
      background: var(--primary-c);
      border-color: transparent;
      color: var(--on-primary-c);
    }

    /* ── Episode list ── */
    .ep-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 8px;
    }
    .ep-header-label {
      font-size: .6875rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--on-surf-var);
    }
    .ep-count-pill {
      background: var(--surf-ch);
      color: var(--primary);
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 12px;
    }

    .ep-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 16px;
      height: 56px;
      cursor: pointer;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .ep-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--on-surface);
      opacity: 0;
      pointer-events: none;
      transition: opacity .1s;
    }
    .ep-item:active::after { opacity: .08; }

    .ep-item.active {
      background: rgba(208,188,255,.08);
    }
    .ep-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 10px; bottom: 10px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--primary);
    }

    .ep-num {
      flex-shrink: 0;
      min-width: 28px;
      text-align: right;
      font-size: .8rem;
      font-weight: 600;
      color: var(--outline);
    }
    .ep-item.active .ep-num { color: var(--primary); }

    .ep-title {
      flex: 1;
      font-size: .9375rem;
      color: var(--on-surface);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ep-item.active .ep-title { color: var(--primary); font-weight: 500; }
    .ep-item.watched .ep-title { color: var(--on-surf-var); }

    .ep-check {
      flex-shrink: 0;
      display: none;
    }
    .ep-item.watched .ep-check { display: block; }

    .ep-divider {
      height: 1px;
      background: rgba(255,255,255,.04);
      margin: 0 16px;
    }

    /* ── Tap zones (double-tap seek) ── */
    .tap-zone {
      position: absolute;
      top: 0; bottom: 20%;
      width: 35%;
      z-index: 2;
      display: none;
    }
    .tap-zone.active { display: block; }
    .tap-left  { left: 0; }
    .tap-right { right: 0; }

    /* ── Seek feedback ── */
    .seek-fb {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(0,0,0,.55);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .05em;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
      z-index: 3;
    }
    .seek-fb.left  { left: 16px; }
    .seek-fb.right { right: 16px; }
    .seek-fb.show  { opacity: 1; }

    /* ── Next episode button ── */
    .next-ep-btn {
      position: absolute;
      bottom: 52px; right: 8px;
      z-index: 4;
      background: rgba(0,0,0,.72);
      color: #fff;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 20px;
      padding: 6px 14px 6px 10px;
      display: none;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: .8125rem;
      font-weight: 500;
      font-family: inherit;
      letter-spacing: .25px;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .next-ep-btn:active { background: rgba(0,0,0,.9); }
    .next-ep-btn.visible { display: flex; }

    /* ── Spinner ── */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(208,188,255,.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main layout ── */
    .main-layout {
      flex: 1;
      display: flex;
    }

    /* ── Navigation Drawer (MD3) ── */
    .drawer-scrim {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
    }
    .drawer-scrim.open { display: block; }
    .drawer {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: min(280px, 85vw);
      background: var(--surf-ch);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform .25s cubic-bezier(.2,0,0,1);
      overflow-y: auto;
    }
    .drawer-scrim.open .drawer { transform: none; }
    .drawer-header {
      padding: 24px 28px 8px;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--on-surf-var);
      flex-shrink: 0;
    }
    .drawer-item {
      display: flex;
      align-items: center;
      height: 56px;
      padding: 0 28px;
      margin: 2px 12px;
      border-radius: 28px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: .15px;
      color: var(--on-surf-var);
      text-align: left;
      width: calc(100% - 24px);
      -webkit-tap-highlight-color: transparent;
      transition: background .15s, color .15s;
    }
    .drawer-item:active { background: rgba(208,188,255,.1); }
    .drawer-item.active {
      background: var(--primary-c);
      color: var(--on-primary-c);
    }

    /* ── Server bottom sheet ── */
    .sheet-scrim {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 100;
    }
    .sheet-scrim.open { display: block; }
    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surf-ch);
      border-radius: 28px 28px 0 0;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 101;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.2,0,0,1);
    }
    .sheet-scrim.open .sheet { transform: none; }
    .sheet-handle {
      width: 32px; height: 4px;
      background: var(--outline-var);
      border-radius: 2px;
      margin: 12px auto 20px;
    }
    .sheet-title {
      font-size: .875rem;
      font-weight: 500;
      color: var(--on-surf-var);
      padding: 0 24px 8px;
      letter-spacing: .1px;
    }
    .sheet-option {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      height: 56px;
      cursor: pointer;
      font-size: 1rem;
      font-family: inherit;
      color: var(--on-surface);
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    .sheet-option:active { background: rgba(202,196,208,.08); }
    .radio-outer {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--outline);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color .15s;
    }
    .sheet-option.selected .radio-outer { border-color: var(--primary); }
    .radio-inner {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--primary);
      display: none;
    }
    .sheet-option.selected .radio-inner { display: block; }
  </style>
</head>

  // ── Config ────────────────────────────────────────────────────────────────────
  const CORS         = 'https://anime-cors-proxy.hasan-celik1501.workers.dev/';
  const PROXY_TOKEN  = '88F6lTnF5pCaR3SDh3D9ctyEnyW7kDKV';
  const PROXY_HEADS  = { 'X-Proxy-Token': PROXY_TOKEN };
  const STORE        = 'anime_progress';

  const ANIME_LIST = [
    {
      id: 'op', label: 'One Piece', short: 'One Piece',
      icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h10c2.76 0 5-2.24 5-5s-2.24-5-5-5zM7 15c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/></svg>`,
      seasons: [

    {

      icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg>`,
      seasons: [

      seasons: [

  // ── State ─────────────────────────────────────────────────────────────────────
  let activeAnime   = 0;
  let activeSeason  = 0;
  let activeEpisode = null;
  let activeServer  = 1;
  let episodes      = [];
  let watchedEps    = {};
  let wakeLock      = null;
  let hlsInstance   = null;

  // ── Persistence ───────────────────────────────────────────────────────────────
  const progressKey = () => `${ANIME_LIST[activeAnime].id}:${activeSeason}`;

  function loadProgress() {
    try {
      const raw = JSON.parse(localStorage.getItem(STORE) || '{}');
      activeAnime  = raw.anime  ?? 0;
      activeSeason = raw.season ?? 0;
      activeServer = raw.server ?? 1;
      watchedEps   = {};
      for (const [k, v] of Object.entries(raw.watched || {})) watchedEps[k] = new Set(v);
      return raw.episode ?? null;
    } catch { return null; }
  }

  function saveProgress() {
    const watched = {};
    for (const [k, v] of Object.entries(watchedEps)) watched[k] = [...v];
    localStorage.setItem(STORE, JSON.stringify({
      anime: activeAnime, season: activeSeason, episode: activeEpisode, server: activeServer, watched,
    }));
  }

  function markWatched(epNum) {
    const k = progressKey();
    if (!watchedEps[k]) watchedEps[k] = new Set();
    watchedEps[k].add(epNum);
    saveProgress();
    epListEl.querySelector(`[data-ep="${epNum}"]`)?.classList.add('watched');
  }

  // ── Wake Lock ─────────────────────────────────────────────────────────────────
  async function acquireWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(_) {}
  }
  const releaseWakeLock = () => { wakeLock?.release(); wakeLock = null; };

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) releaseWakeLock();
    else if (activeEpisode && (playerFrame?.style.display !== 'none' || playerVideo?.style.display !== 'none')) acquireWakeLock();
  });

  // ── Media Session ─────────────────────────────────────────────────────────────
  function updateMediaSession(epNum) {
    if (!('mediaSession' in navigator)) return;
    const anime  = ANIME_LIST[activeAnime];
    const season = anime.seasons[activeSeason];
    navigator.mediaSession.metadata = new MediaMetadata({
      title:   `Folge ${epNum}`,
      artist:  anime.label + (anime.seasons.length > 1 ? ' · ' + season.label : ''),
      artwork: [{ src: 'icons/icon-512.png', sizes: '512x512', type: 'image/png' }],
    });
    navigator.mediaSession.setActionHandler('previoustrack',
      epNum > 1             ? () => selectEpisode(epNum - 1) : null);
    navigator.mediaSession.setActionHandler('nexttrack',
      epNum < episodes.length ? () => selectEpisode(epNum + 1) : null);
  }

  // ── DOM refs ──────────────────────────────────────────────────────────────────
  const topbarTitle  = document.getElementById('topbar-title');
  const serverBtn    = document.getElementById('server-btn');
  const serverDot    = document.getElementById('server-dot');
  const sheetScrim   = document.getElementById('sheet-scrim');
  const sheetOptions = document.getElementById('sheet-options');
  const scrollArea   = document.getElementById('scroll-area');
  const epListEl     = document.getElementById('ep-list');
  const epCountEl    = document.getElementById('ep-count');
  const playerFrame  = document.getElementById('player-frame');
  const playerVideo  = document.getElementById('player-video');
  const placeholder  = document.getElementById('placeholder');
  const metaAnime    = document.getElementById('meta-anime');
  const metaEp       = document.getElementById('meta-ep');
  const resumeBadge  = document.getElementById('resume-badge');
  const errorBar     = document.getElementById('error-bar');
  const menuBtn      = document.getElementById('menu-btn');
  const drawerScrim  = document.getElementById('drawer-scrim');
  const drawerItems  = document.getElementById('drawer-items');
  const seasonChips  = document.getElementById('season-chips');

  const playerWrap = document.getElementById('player-wrap');
  const tapLeft    = document.getElementById('tap-left');
  const tapRight   = document.getElementById('tap-right');
  const seekFbLeft = document.getElementById('seek-fb-left');
  const seekFbRight= document.getElementById('seek-fb-right');
  const nextEpBtn  = document.getElementById('next-ep-btn');

  // ── Double-tap seek ───────────────────────────────────────────────────────────
  let lastTap = { time: 0, side: null };
  let seekFbTimer  = null;
  let controlsTimer = null;

  function showSeekFb(side) {
    const el = side === 'left' ? seekFbLeft : seekFbRight;
    el.classList.add('show');
    clearTimeout(seekFbTimer);
    seekFbTimer = setTimeout(() => {
      seekFbLeft.classList.remove('show');
      seekFbRight.classList.remove('show');
    }, 700);
  }

  function onTapZone(side) {
    const now = Date.now();
    if (now - lastTap.time < 350 && lastTap.side === side) {
      const delta = side === 'left' ? -10 : 10;
      playerVideo.currentTime = Math.max(0, Math.min(playerVideo.duration || 0, playerVideo.currentTime + delta));
      showSeekFb(side);
      lastTap = { time: 0, side: null };
    } else {
      lastTap = { time: now, side };
    }
  }

  tapLeft.addEventListener('touchend',  e => { e.preventDefault(); onTapZone('left'); },  { passive: false });
  tapRight.addEventListener('touchend', e => { e.preventDefault(); onTapZone('right'); }, { passive: false });
  tapLeft.addEventListener('click',  () => onTapZone('left'));
  tapRight.addEventListener('click', () => onTapZone('right'));

  // ── Player overlays (next ep btn + tap zones visibility) ──────────────────────
  // For native video: button auto-hides like native controls (via showVideoControls).
  // For iframe: button is always visible (no native controls to conflict with).
  function updatePlayerOverlays() {
    const isVideo = playerVideo.style.display !== 'none';
    const isFrame = playerFrame.style.display !== 'none';
    const hasNext = activeEpisode != null && activeEpisode < episodes.length;
    tapLeft.classList.toggle('active', isVideo);
    tapRight.classList.toggle('active', isVideo);
    if (!hasNext || (!isVideo && !isFrame)) {
      nextEpBtn.classList.remove('visible');
      clearTimeout(controlsTimer);
    } else if (isFrame) {
      nextEpBtn.classList.add('visible');
    }
    // For native video, visibility is driven by showVideoControls / hide timer
  }

  // Show next-ep button and (re)start the auto-hide timer, mirroring native controls.
  function showVideoControls() {
    const hasNext = activeEpisode != null && activeEpisode < episodes.length;
    if (playerVideo.style.display === 'none' || !hasNext) return;
    nextEpBtn.classList.add('visible');
    clearTimeout(controlsTimer);
    if (!playerVideo.paused && !playerVideo.ended) {
      controlsTimer = setTimeout(() => nextEpBtn.classList.remove('visible'), 3000);
    }
  }

  // Any interaction on the player shows the button (mirrors native controls behaviour)
  playerWrap.addEventListener('touchstart', showVideoControls, { passive: true });
  playerWrap.addEventListener('mousemove',  showVideoControls);

  nextEpBtn.addEventListener('click', () => {
    if (activeEpisode != null && activeEpisode < episodes.length) selectEpisode(activeEpisode + 1);
  });

  playerVideo.addEventListener('play',  acquireWakeLock);
  playerVideo.addEventListener('pause', releaseWakeLock);
  playerVideo.addEventListener('ended', () => {
    if (activeEpisode && activeEpisode < episodes.length) selectEpisode(activeEpisode + 1);
  });

  // Keep next-ep button in sync with native controls show/hide
  playerVideo.addEventListener('play', () => {
    clearTimeout(controlsTimer);
    controlsTimer = setTimeout(() => nextEpBtn.classList.remove('visible'), 3000);
  });
  playerVideo.addEventListener('pause', () => {
    clearTimeout(controlsTimer);
    const hasNext = activeEpisode != null && activeEpisode < episodes.length;
    if (hasNext) nextEpBtn.classList.add('visible');
  });

  const showError = msg => { errorBar.textContent = msg; errorBar.style.display = 'block'; };
  const hideError = ()  => { errorBar.style.display = 'none'; };

  // ── Fetch ─────────────────────────────────────────────────────────────────────
  const proxyGet = url => fetch(CORS + url, { headers: PROXY_HEADS }).then(r => r.text());

  // ── Luluvid m3u8 extraction ───────────────────────────────────────────────────
  function extractLuluM3u8(html) {
    const idx = html.indexOf("eval(function(p,a,c,k,e,d){while");
    if (idx < 0) return null;
    const block = html.slice(idx, idx + 80000);
    const kwEnd = block.lastIndexOf("'.split('|')))");
    if (kwEnd < 0) return null;
    const kwStart = block.slice(0, kwEnd).lastIndexOf(",'") + 2;
    const keywords = block.slice(kwStart, kwEnd).split('|');
    const fnEnd = block.indexOf("}(", block.indexOf("(function(p,a,c,k,e,d){"));
    const afterFn = block.slice(fnEnd + 2);
    const ps = afterFn.indexOf("'");
    let pe = ps + 1;
    while (true) { pe = afterFn.indexOf("'", pe); if (afterFn[pe - 1] !== '\\') break; pe++; }
    const packed = afterFn.slice(ps + 1, pe);
    const unpacked = packed.replace(/\b([0-9a-z]+)\b/g, m => {
      const n = parseInt(m, 36);
      return (n < keywords.length && keywords[n]) ? keywords[n] : m;
    });
    const m = unpacked.match(/file:"(https?:\/\/[^"]+\.m3u8[^"]*)"/);
    return m ? m[1] : null;
  }

  function destroyHls() {
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  }

  function playM3u8(m3u8Url) {
    destroyHls();
    playerVideo.src = '';
    if (Hls.isSupported()) {
      const ProxiedLoader = class extends Hls.DefaultConfig.loader {
        load(context, config, callbacks) {
          if (!context.url.startsWith(CORS)) context.url = CORS + context.url;
          context.headers = { ...context.headers, ...PROXY_HEADS };
          super.load(context, config, callbacks);
        }
      };
      hlsInstance = new Hls({ loader: ProxiedLoader });
      hlsInstance.loadSource(CORS + m3u8Url);
      hlsInstance.attachMedia(playerVideo);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => playerVideo.play().catch(() => {}));
    } else if (playerVideo.canPlayType('application/vnd.apple.mpegurl')) {
      playerVideo.src = CORS + m3u8Url;
      playerVideo.play().catch(() => {});
    } else {
      throw new Error('HLS nicht unterstützt');
    }
  }

  // ── Server sheet ──────────────────────────────────────────────────────────────
  function openServerSheet() {
    sheetOptions.innerHTML = [1, 2, 3, 4].map(n => `
      <button class="sheet-option ${n === activeServer ? 'selected' : ''}" data-n="${n}">
        <div class="radio-outer"><div class="radio-inner"></div></div>
        Server ${n}
      </button>
    `).join('');
    sheetOptions.querySelectorAll('.sheet-option').forEach(btn => {
      btn.addEventListener('click', () => {
        const n = parseInt(btn.dataset.n);
        closeServerSheet();
        if (n === activeServer) return;
        activeServer = n;
        serverDot.textContent = n;
        saveProgress();
        const prev = activeEpisode;
        loadSeason(activeSeason).then(() => { if (prev) selectEpisode(prev); });
      });
    });
    sheetScrim.classList.add('open');
  }
  const closeServerSheet = () => sheetScrim.classList.remove('open');

  serverBtn.addEventListener('click', openServerSheet);
  sheetScrim.addEventListener('click', e => { if (e.target === sheetScrim) closeServerSheet(); });

  // ── Drawer ────────────────────────────────────────────────────────────────────
  const openDrawer  = () => drawerScrim.classList.add('open');
  const closeDrawer = () => drawerScrim.classList.remove('open');

  menuBtn.addEventListener('click', openDrawer);
  drawerScrim.addEventListener('click', e => { if (!e.target.closest('.drawer') || e.target === drawerScrim) closeDrawer(); });

  function buildDrawer() {
    drawerItems.innerHTML = ANIME_LIST.map((a, i) => `
      <button class="drawer-item ${i === activeAnime ? 'active' : ''}" data-idx="${i}">
        ${a.label}
      </button>
    `).join('');
    drawerItems.querySelectorAll('.drawer-item').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        closeDrawer();
        if (idx === activeAnime) return;
        destroyHls();
        activeAnime   = idx;
        activeSeason  = 0;
        activeEpisode = null;
        saveProgress();
        drawerItems.querySelectorAll('.drawer-item').forEach((b, i) => b.classList.toggle('active', i === idx));
        buildSeasonChips();
        loadSeason(0);
      });
    });
  }

  // ── Season chips ──────────────────────────────────────────────────────────────
  function buildSeasonChips() {
    const anime   = ANIME_LIST[activeAnime];
    const seasons = anime.seasons;
    const isAjax  = seasons[activeSeason]?.type === 'ajax';

    topbarTitle.textContent       = anime.label;
    serverBtn.style.display       = isAjax ? 'flex' : 'none';
    serverDot.textContent         = activeServer;
    seasonChips.style.display     = seasons.length > 1 ? 'flex' : 'none';

    if (seasons.length <= 1) return;

    seasonChips.innerHTML = seasons.map((s, i) => `
      <button class="chip ${i === activeSeason ? 'active' : ''}" data-idx="${i}">${s.label}</button>
    `).join('');
    seasonChips.querySelectorAll('.chip').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        if (idx === activeSeason) return;
        destroyHls();
        activeSeason  = idx;
        activeEpisode = null;
        saveProgress();
        seasonChips.querySelectorAll('.chip').forEach(b => b.classList.toggle('active', +b.dataset.idx === idx));
        serverBtn.style.display = ANIME_LIST[activeAnime].seasons[idx]?.type === 'ajax' ? 'flex' : 'none';
        loadSeason(idx);
      });
    });
  }

  // ── Load season ───────────────────────────────────────────────────────────────
  async function loadSeason(seasonIdx, resumeEp = null) {
    const anime  = ANIME_LIST[activeAnime];
    const season = anime.seasons[seasonIdx];
    activeSeason = seasonIdx;
    hideError();

    epListEl.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:48px 16px;">
        <div class="spinner"></div>
        <p style="font-size:.875rem;color:var(--on-surf-var);">Lade…</p>
      </div>`;
    epCountEl.textContent = '–';
    metaAnime.textContent = anime.label + (anime.seasons.length > 1 ? ' · ' + season.label : '');
    metaEp.textContent    = '';
    playerFrame.style.display   = 'none';
    playerVideo.style.display   = 'none';
    playerVideo.src              = '';
    destroyHls();
    placeholder.style.display   = 'flex';
    placeholder.innerHTML = `
      <div class="play-circle">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor" style="margin-left:4px">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </div>
      <p>Episode auswählen</p>`;

    try {
      if (season.type === 'ajax') {
        await loadAjaxEpisodes(season, resumeEp);
      } else if (season.type === 'animebase') {
        await loadAnimebaseEpisodes(season, resumeEp);
      } else {
        loadLinkEpisodes(season, resumeEp); // covers both 'link' and 'tube'
      }
    } catch (e) {
      showError('Episoden konnten nicht geladen werden: ' + e.message);
      epListEl.innerHTML = `<p style="padding:16px;color:var(--on-surf-var);font-size:.875rem;">Fehler beim Laden.</p>`;
    }
  }

  async function loadAjaxEpisodes(season, resumeEp) {
    const fileUrl = `https://www.animetoast.cc/wp-content/uploads/iframe-data/${encodeURIComponent(season.title)}-server${activeServer}.txt`;
    const text = await proxyGet(fileUrl);
    const urls = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
    if (!urls.length) throw new Error('Keine Episoden gefunden');
    episodes = urls.map((url, i) => ({ number: i + 1, title: `Episode ${i + 1}`, url }));
    renderEpisodeList();
    if (resumeEp) selectEpisode(resumeEp, true);
  }

  function decodeHtmlEntities(str) {
    const el = document.createElement('textarea');
    el.innerHTML = str;
    return el.value;
  }

  async function loadAnimebaseEpisodes(season, resumeEp) {
    const html = await proxyGet(`https://anime-base.net/anime/${season.slug}`);
    const attrM = html.match(/data-page="([^"]+)"/);
    if (!attrM) throw new Error('Seite nicht lesbar');
    const json = JSON.parse(decodeHtmlEntities(attrM[1]));
    let eps = json.props?.serie?.episodes;
    if (!eps?.length) throw new Error('Keine Episoden gefunden');
    if (season.abSeason != null) eps = eps.filter(ep => ep.season === season.abSeason);
    if (season.dubsub  != null) eps = eps.filter(ep => ep.dubsub  === season.dubsub);
    eps = eps.filter(ep => ep.link1);
    if (!eps.length) throw new Error('Keine Episoden gefunden');
    episodes = eps.map((ep, i) => ({
      number: i + 1,
      title: ep.name || `Episode ${i + 1}`,
      luluUrl: ep.link1,
    }));
    renderEpisodeList();
    if (resumeEp) selectEpisode(resumeEp, true);
  }

  function loadLinkEpisodes(season, resumeEp) {
    episodes = Array.from({ length: season.episodeCount }, (_, i) => ({
      number: i + 1, title: `Episode ${i + 1}`,
    }));
    renderEpisodeList();
    if (resumeEp) selectEpisode(resumeEp, true);
  }

  // ── Render list ───────────────────────────────────────────────────────────────
  function renderEpisodeList() {
    const watched = watchedEps[progressKey()] || new Set();
    epCountEl.textContent = episodes.length;
    const ordered = [...episodes].reverse();
    epListEl.innerHTML = ordered.map((ep, i) => `
      <div class="ep-item ${watched.has(ep.number) ? 'watched' : ''}" data-ep="${ep.number}">
        <span class="ep-num">${String(ep.number).padStart(2, '0')}</span>
        <span class="ep-title">${ep.title}</span>
        <svg class="ep-check" width="18" height="18" viewBox="0 0 24 24" fill="var(--primary)">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
      </div>
      ${i < ordered.length - 1 ? '<div class="ep-divider"></div>' : ''}
    `).join('');
    epListEl.querySelectorAll('.ep-item').forEach(el => {
      el.addEventListener('click', () => selectEpisode(parseInt(el.dataset.ep)));
    });
    updatePlayerOverlays();
  }

  // ── Select episode ────────────────────────────────────────────────────────────
  async function selectEpisode(epNum, isResume = false) {
    const season = ANIME_LIST[activeAnime].seasons[activeSeason];
    activeEpisode = epNum;
    saveProgress();
    hideError();

    epListEl.querySelectorAll('.ep-item').forEach(el =>
      el.classList.toggle('active', parseInt(el.dataset.ep) === epNum)
    );
    epListEl.querySelector('.ep-item.active')?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    // Exit fullscreen before switching so video doesn't hang
    const wasFullscreen = document.fullscreenElement === playerVideo;
    if (wasFullscreen) { try { await document.exitFullscreen(); } catch(_) {} }

    destroyHls();
    playerFrame.style.display  = 'none';
    playerVideo.style.display  = 'none';
    playerVideo.src            = '';
    placeholder.style.display  = 'flex';
    placeholder.innerHTML = `<div class="spinner"></div><p style="font-size:.875rem;">Lade Folge ${epNum}…</p>`;
    metaEp.textContent = `Folge ${epNum}`;
    resumeBadge.style.display = isResume ? 'inline' : 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    updatePlayerOverlays();

    try {
      let embedUrl;
      if (season.type === 'ajax') {
        const ep = episodes.find(e => e.number === epNum);
        if (!ep?.url) throw new Error('Keine URL');
        embedUrl = ep.url;
        metaEp.textContent = `Folge ${epNum} / ${episodes.length}`;
      } else if (season.type === 'tube') {
        const html1  = await proxyGet(`https://onepiece.tube/anime/folge/${epNum}`);
        const embedM = html1.match(/src="(https:\/\/hubu\.cloud\/[^"]+)"/i);
        if (!embedM) throw new Error('Kein Embed gefunden');
        const html2  = await proxyGet(embedM[1]);
        const mp4M   = html2.match(/<source src="([^"]+\.mp4[^"]*)"/i);
        if (!mp4M) throw new Error('Keine Video-URL');
        metaEp.textContent        = `Folge ${epNum} / ${season.episodeCount}`;
        playerVideo.src           = mp4M[1];
        playerVideo.style.display = 'block';
        placeholder.style.display = 'none';
        playerVideo.play().catch(() => {});
        acquireWakeLock();
        updateMediaSession(epNum);
        if ('mediaSession' in navigator) {
          navigator.mediaSession.setActionHandler('play',   () => playerVideo.play());
          navigator.mediaSession.setActionHandler('pause',  () => playerVideo.pause());
          navigator.mediaSession.setActionHandler('seekto', d  => { playerVideo.currentTime = d.seekTime; });
        }
        setTimeout(() => markWatched(epNum), 10000);
        updatePlayerOverlays();
        if (wasFullscreen) {
          playerVideo.addEventListener('playing', () => {
            playerVideo.requestFullscreen?.().catch(() => {});
          }, { once: true });
        }
        return;
      } else if (season.type === 'animebase') {
        const ep = episodes.find(e => e.number === epNum);
        if (!ep?.luluUrl) throw new Error('Keine Stream-URL');
        const luluUri = new URL(ep.luluUrl);
        const embedPage = `${luluUri.origin}/e/${luluUri.pathname.slice(1)}`;
        const luluHtml = await proxyGet(embedPage);
        const m3u8Url = extractLuluM3u8(luluHtml);
        if (!m3u8Url) throw new Error('Keine Video-URL (eval unpack fehlgeschlagen)');
        metaEp.textContent        = `Folge ${epNum} / ${episodes.length}`;
        playM3u8(m3u8Url);
        playerVideo.style.display = 'block';
        placeholder.style.display = 'none';
        acquireWakeLock();
        updateMediaSession(epNum);
        if ('mediaSession' in navigator) {
          navigator.mediaSession.setActionHandler('play',   () => playerVideo.play());
          navigator.mediaSession.setActionHandler('pause',  () => playerVideo.pause());
          navigator.mediaSession.setActionHandler('seekto', d  => { playerVideo.currentTime = d.seekTime; });
        }
        setTimeout(() => markWatched(epNum), 10000);
        updatePlayerOverlays();
        if (wasFullscreen) {
          playerVideo.addEventListener('playing', () => {
            playerVideo.requestFullscreen?.().catch(() => {});
          }, { once: true });
        }
        return;
      } else {
        const linkN  = season.linkOffset + epNum;
        const html   = await proxyGet(`https://www.animetoast.cc/${season.slug}/?link=${linkN}`);
        const iframe = html.match(/<iframe[^>]+src="(https?:\/\/[^"]+)"/i);
        if (iframe) {
          embedUrl = iframe[1];
        } else {
          const voe = html.match(/id="player-embed"[^]*?href="(https?:\/\/voe\.sx\/([^"]+))"/i);
          if (!voe) throw new Error('Kein Embed gefunden');
          embedUrl = `https://voe.sx/e/${voe[2]}`;
        }
        metaEp.textContent = `Folge ${epNum} / ${season.episodeCount}`;
      }

      playerFrame.src = embedUrl;
      playerFrame.style.display  = 'block';
      placeholder.style.display  = 'none';
      acquireWakeLock();
      updateMediaSession(epNum);
      setTimeout(() => markWatched(epNum), 10000);
      updatePlayerOverlays();
    } catch (e) {
      showError(`Folge ${epNum} konnte nicht geladen werden: ${e.message}`);
      placeholder.innerHTML = `
        <div class="play-circle">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="var(--error)">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
          </svg>
        </div>
        <p style="font-size:.875rem;">Episode nicht verfügbar</p>`;
      placeholder.style.display = 'flex';
      updatePlayerOverlays();
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  const savedEp = loadProgress();
  buildDrawer();
  buildSeasonChips();
  loadSeason(activeSeason, savedEp);

  // Unregister any previously installed service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
    });
  }

</script>
