<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#121212" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0b0f;
      --surface: #13151d;
      --card:    #1a1d27;
      --border:  #252836;
      --accent:  #7c5cbf;
      --accent2: #a97de8;
      --text:    #e8eaf0;
      --muted:   #5a6078;
      --danger:  #ef4444;
      --radius:  8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ───────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    /* Anime switcher */
    .anime-tabs { display: flex; gap: 6px; }
    .anime-tab {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: .82rem;
      font-weight: 700;
      transition: all .15s;
    }
    .anime-tab:hover { border-color: var(--accent2); color: var(--text); }
    .anime-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Season tabs */
    .season-tabs { display: flex; gap: 5px; }
    .season-tab {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: .75rem;
      font-weight: 600;
      transition: all .15s;
    }
    .season-tab:hover { border-color: var(--accent); color: var(--text); }
    .season-tab.active { background: var(--card); border-color: var(--accent2); color: var(--accent2); }

    .topbar-divider {
      width: 1px; height: 22px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* Server picker */
    .server-pick { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .server-pick label { font-size: .73rem; color: var(--muted); }
    .server-pick select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: .75rem;
      cursor: pointer;
    }

    /* ── Main layout ───────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 49px);
    }

    /* ── Player column ─────────────────────── */
    .player-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: #000;
    }
    .player-box {
      flex: 1;
      position: relative;
      background: #000;
    }
    .player-box iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
    }
    .player-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      background: #0a0b0f;
      color: var(--muted);
    }
    .play-icon {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: var(--card);
      display: flex; align-items: center; justify-content: center;
      opacity: .35;
    }
    .player-placeholder p { font-size: .88rem; }

    .player-meta-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 9px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .meta-anime { font-size: .72rem; color: var(--muted); }
    .meta-ep { font-size: .9rem; font-weight: 700; }
    .resume-badge {
      font-size: .68rem;
      background: var(--accent);
      color: #fff;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
    }

    /* ── Episode sidebar ───────────────────── */
    .ep-sidebar {
      width: 270px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .ep-sidebar-header {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
    .ep-sidebar-header span:last-child { color: var(--accent2); }

    .ep-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .ep-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
      position: relative;
    }
    .ep-item:last-child { border-bottom: none; }
    .ep-item:hover { background: var(--card); }
    .ep-item.active { background: #1e1535; border-left: 2px solid var(--accent2); }
    .ep-item.watched .ep-num { color: var(--muted); }
    .ep-item.watched::after {
      content: '✓'; position: absolute; right: 12px;
      font-size: .68rem; color: var(--accent); font-weight: 700;
    }
    .ep-num { font-size: .7rem; font-weight: 700; color: var(--accent2); min-width: 22px; }
    .ep-title { font-size: .82rem; line-height: 1.3; }

    /* ── Spinner ───────────────────────────── */
    .spinner {
      width: 30px; height: 30px;
      border: 2px solid var(--border);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error bar ─────────────────────────── */
    .error-bar {
      background: #1f0a0a;
      border-bottom: 1px solid var(--danger);
      color: #fca5a5;
      padding: 7px 16px;
      font-size: .78rem;
      display: none;
      flex-shrink: 0;
    }

    /* ── Responsive ────────────────────────── */
    @media (max-width: 700px) {
      .layout { flex-direction: column; height: auto; }
      .player-col { height: 56vw; min-height: 200px; }
      .ep-sidebar { width: 100%; height: 240px; border-left: none; border-top: 1px solid var(--border); }
      .server-pick { margin-left: 0; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="anime-tabs" id="anime-tabs"></div>
  <div class="topbar-divider" id="season-divider" style="display:none;"></div>
  <div class="season-tabs" id="season-tabs"></div>
  <div class="server-pick" id="server-wrap" style="display:none;">
    <label for="server-select">Server</label>
    <select id="server-select">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>
  </div>
</div>

<div class="error-bar" id="error-bar"></div>

<div class="layout">
  <div class="player-col">
    <div class="player-box">
      <div class="player-placeholder" id="placeholder">
        <div class="play-icon">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <p>Episode auswählen</p>
      </div>
      <iframe id="player-frame" allowfullscreen style="display:none;"></iframe>
    </div>
    <div class="player-meta-bar">
      <div>
        <div class="meta-anime" id="meta-anime">–</div>
        <div class="meta-ep" id="meta-ep"></div>
      </div>
      <span class="resume-badge" id="resume-badge" style="display:none;">Fortgesetzt</span>
    </div>
  </div>

  <div class="ep-sidebar">
    <div class="ep-sidebar-header">
      <span>Episoden</span>
      <span id="ep-count">–</span>
    </div>
    <div class="ep-list" id="ep-list">
      <div style="padding:28px;text-align:center;">
        <div class="spinner" style="margin:0 auto 10px;"></div>
        <p style="font-size:.78rem;color:var(--muted);">Lade…</p>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Config ───────────────────────────────────────────────────────────────
  const CORS  = 'https://cors.eu.org/';
  const STORE = 'anime_progress'; // localStorage key

  // type:'ajax'  → uses WP admin-ajax get_episode_data (JJK)
  // type:'link'  → fetches ?link=N page and extracts iframe src (One Piece)
  const ANIME_LIST = [
    {
      id: 'jjk',
      label: 'Jujutsu Kaisen',
      seasons: [
        { label: 'Staffel 1', type: 'ajax', slug: 'jujutsu-kaisen-ger-dub',            title: 'Jujutsu Kaisen Dub S1' },
        { label: 'Staffel 2', type: 'ajax', slug: 'jujutsu-kaisen-2nd-season-ger-dub', title: 'Jujutsu Kaisen Dub S2' },
      ],
    },
    {
      id: 'frieren',
      label: 'Frieren',
      seasons: [
        // S1: AJAX mode via WP admin-ajax
        { label: 'Staffel 1', type: 'ajax', slug: 'sousou-no-frieren-ger-dub', title: 'Sousou no Frieren Dub S1' },
        // S2: ?link=N pages with vidmoly iframes; Ep N → link=(15+N)
        { label: 'Staffel 2', type: 'link', slug: 'sousou-no-frieren-2nd-season-ger-dub', linkOffset: 15, episodeCount: 16 },
      ],
    },
    {
      id: 'op',
      label: 'One Piece',
      seasons: [
        // Gyojin-tou-hen Ger Sub: ?link=N pages with VOE href; Ep N → link=(N-1)
        { label: 'Ger Sub', type: 'link', slug: 'one-piece-gyojin-tou-hen-ger-sub', linkOffset: -1, episodeCount: 17 },
      ],
    },
  ];

  // ── State ────────────────────────────────────────────────────────────────
  let activeAnime   = 0;
  let activeSeason  = 0;
  let activeEpisode = null;
  let episodes      = [];
  let watchedEps    = {}; // "animeId:seasonIdx" → Set of ep numbers

  // ── Persistence ──────────────────────────────────────────────────────────
  function progressKey() { return `${ANIME_LIST[activeAnime].id}:${activeSeason}`; }

  function loadProgress() {
    try {
      const raw = JSON.parse(localStorage.getItem(STORE) || '{}');
      activeAnime  = raw.anime  ?? 0;
      activeSeason = raw.season ?? 0;
      watchedEps   = {};
      for (const [k, v] of Object.entries(raw.watched || {})) {
        watchedEps[k] = new Set(v);
      }
      return raw.episode ?? null;
    } catch { return null; }
  }

  function saveProgress() {
    const watched = {};
    for (const [k, v] of Object.entries(watchedEps)) watched[k] = [...v];
    localStorage.setItem(STORE, JSON.stringify({
      anime: activeAnime, season: activeSeason, episode: activeEpisode, watched,
    }));
  }

  function markWatched(epNum) {
    const k = progressKey();
    if (!watchedEps[k]) watchedEps[k] = new Set();
    watchedEps[k].add(epNum);
    saveProgress();
    epListEl.querySelector(`[data-ep="${epNum}"]`)?.classList.add('watched');
  }

  // ── DOM ───────────────────────────────────────────────────────────────────
  const animeTabsEl  = document.getElementById('anime-tabs');
  const seasonTabsEl = document.getElementById('season-tabs');
  const seasonDiv    = document.getElementById('season-divider');
  const serverWrap   = document.getElementById('server-wrap');
  const serverSelect = document.getElementById('server-select');
  const epListEl     = document.getElementById('ep-list');
  const epCountEl    = document.getElementById('ep-count');
  const playerFrame  = document.getElementById('player-frame');
  const placeholder  = document.getElementById('placeholder');
  const metaAnime    = document.getElementById('meta-anime');
  const metaEp       = document.getElementById('meta-ep');
  const resumeBadge  = document.getElementById('resume-badge');
  const errorBar     = document.getElementById('error-bar');

  const showError = msg => { errorBar.textContent = msg; errorBar.style.display = 'block'; };
  const hideError = ()  => { errorBar.style.display = 'none'; };

  // ── Fetch helpers ─────────────────────────────────────────────────────────
  const proxyGet = url => fetch(CORS + url).then(r => r.text());

  // ── Build tabs ────────────────────────────────────────────────────────────
  function buildAnimeTabs() {
    animeTabsEl.innerHTML = ANIME_LIST.map((a, i) => `
      <button class="anime-tab ${i === activeAnime ? 'active' : ''}" data-idx="${i}">${a.label}</button>
    `).join('');
    animeTabsEl.querySelectorAll('.anime-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        if (idx === activeAnime) return;
        activeAnime  = idx;
        activeSeason = 0;
        activeEpisode = null;
        saveProgress();
        animeTabsEl.querySelectorAll('.anime-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        buildSeasonTabs();
        loadSeason(0);
      });
    });
  }

  function buildSeasonTabs() {
    const anime   = ANIME_LIST[activeAnime];
    const seasons = anime.seasons;
    const multi   = seasons.length > 1;

    seasonDiv.style.display   = multi ? 'block' : 'none';
    seasonTabsEl.style.display = multi ? 'flex'  : 'none';
    serverWrap.style.display  = seasons[activeSeason]?.type === 'ajax' ? 'flex' : 'none';

    if (!multi) return;

    seasonTabsEl.innerHTML = seasons.map((s, i) => `
      <button class="season-tab ${i === activeSeason ? 'active' : ''}" data-idx="${i}">${s.label}</button>
    `).join('');
    seasonTabsEl.querySelectorAll('.season-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        if (idx === activeSeason) return;
        activeSeason = idx;
        activeEpisode = null;
        saveProgress();
        seasonTabsEl.querySelectorAll('.season-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Update server picker visibility for new season type
        const anime = ANIME_LIST[activeAnime];
        serverWrap.style.display = anime.seasons[idx]?.type === 'ajax' ? 'flex' : 'none';
        loadSeason(idx);
      });
    });
  }

  // ── Load episode list ─────────────────────────────────────────────────────
  async function loadSeason(seasonIdx, resumeEp = null) {
    const anime  = ANIME_LIST[activeAnime];
    const season = anime.seasons[seasonIdx];
    activeSeason = seasonIdx;
    hideError();

    epListEl.innerHTML = `<div style="padding:28px;text-align:center;">
      <div class="spinner" style="margin:0 auto 10px;"></div>
      <p style="font-size:.78rem;color:var(--muted);">Lade…</p></div>`;
    epCountEl.textContent = '–';
    metaAnime.textContent = anime.label + (anime.seasons.length > 1 ? ' – ' + season.label : '');
    metaEp.textContent = '';
    playerFrame.style.display = 'none';
    placeholder.style.display = 'flex';
    placeholder.innerHTML = `<div class="play-icon"><svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div><p>Episode auswählen</p>`;

    try {
      if (season.type === 'ajax') {
        await loadAjaxEpisodes(season, resumeEp);
      } else {
        loadLinkEpisodes(season, resumeEp);
      }
    } catch (e) {
      showError('Episoden konnten nicht geladen werden: ' + e.message);
      epListEl.innerHTML = `<p style="padding:14px;color:var(--muted);font-size:.8rem;">Fehler beim Laden.</p>`;
    }
  }

  // AJAX mode (JJK/Frieren S1) — read pre-built text file, one URL per line
  async function loadAjaxEpisodes(season, resumeEp) {
    const fileUrl = `https://www.animetoast.cc/wp-content/uploads/iframe-data/${encodeURIComponent(season.title)}-server${serverSelect.value}.txt`;
    const text = await proxyGet(fileUrl);
    const urls = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
    if (!urls.length) throw new Error('Keine Episoden gefunden');
    episodes = urls.map((url, i) => ({ number: i + 1, title: `Episode ${i + 1}`, url }));
    renderEpisodeList();
    if (resumeEp) selectEpisode(resumeEp, true);
  }

  // Link mode (One Piece) — episode list is static
  function loadLinkEpisodes(season, resumeEp) {
    episodes = Array.from({ length: season.episodeCount }, (_, i) => ({
      number: i + 1,
      title: `Episode ${i + 1}`,
    }));
    renderEpisodeList();
    if (resumeEp) selectEpisode(resumeEp, true);
  }

  // ── Render list ───────────────────────────────────────────────────────────
  function renderEpisodeList() {
    const k       = progressKey();
    const watched = watchedEps[k] || new Set();
    epCountEl.textContent = episodes.length;
    epListEl.innerHTML = episodes.map(ep => `
      <div class="ep-item ${watched.has(ep.number) ? 'watched' : ''}" data-ep="${ep.number}">
        <span class="ep-num">${String(ep.number).padStart(2, '0')}</span>
        <span class="ep-title">${ep.title}</span>
      </div>
    `).join('');
    epListEl.querySelectorAll('.ep-item').forEach(el => {
      el.addEventListener('click', () => selectEpisode(parseInt(el.dataset.ep), false));
    });
  }

  // ── Select episode ────────────────────────────────────────────────────────
  async function selectEpisode(epNum, isResume = false) {
    const anime  = ANIME_LIST[activeAnime];
    const season = anime.seasons[activeSeason];
    activeEpisode = epNum;
    saveProgress();
    hideError();

    epListEl.querySelectorAll('.ep-item').forEach(el =>
      el.classList.toggle('active', parseInt(el.dataset.ep) === epNum)
    );
    epListEl.querySelector('.ep-item.active')?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    playerFrame.style.display = 'none';
    placeholder.style.display = 'flex';
    placeholder.innerHTML = `<div class="spinner"></div><p>Lade Folge ${epNum}…</p>`;
    metaEp.textContent = `Folge ${epNum}`;
    resumeBadge.style.display = isResume ? 'inline' : 'none';

    try {
      let embedUrl;
      if (season.type === 'ajax') {
        const ep = episodes.find(e => e.number === epNum);
        if (!ep?.url) throw new Error('Keine URL');
        embedUrl = ep.url;
        metaEp.textContent = `Folge ${epNum} / ${episodes.length}`;
      } else {
        // Link mode: fetch ?link=N page, extract embed URL
        const linkN = season.linkOffset + epNum;
        const html  = await proxyGet(`https://www.animetoast.cc/${season.slug}/?link=${linkN}`);
        // Strategy 1: <iframe src="...">
        const iframeM = html.match(/<iframe[^>]+src="(https?:\/\/[^"]+)"/i);
        if (iframeM) {
          embedUrl = iframeM[1];
        } else {
          // Strategy 2: player-embed <a href="https://voe.sx/..."> → convert to embed URL
          const voeM = html.match(/id="player-embed"[^]*?href="(https?:\/\/voe\.sx\/([^"]+))"/i);
          if (!voeM) throw new Error('Kein Embed gefunden');
          embedUrl = `https://voe.sx/e/${voeM[2]}`;
        }
        metaEp.textContent = `Folge ${epNum} / ${season.episodeCount}`;
      }

      playerFrame.src = embedUrl;
      playerFrame.style.display = 'block';
      placeholder.style.display = 'none';

      setTimeout(() => markWatched(epNum), 10000);
    } catch (e) {
      showError(`Folge ${epNum} konnte nicht geladen werden: ${e.message}`);
      placeholder.innerHTML = `<div class="play-icon"><svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg></div><p>Episode nicht verfügbar</p>`;
      placeholder.style.display = 'flex';
    }
  }

  // ── Server change (AJAX mode only) ────────────────────────────────────────
  serverSelect.addEventListener('change', () => {
    const prev = activeEpisode;
    loadSeason(activeSeason).then(() => { if (prev) selectEpisode(prev); });
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  const savedEp = loadProgress();
  buildAnimeTabs();
  buildSeasonTabs();
  loadSeason(activeSeason, savedEp);

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
