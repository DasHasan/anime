<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Anime</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1c1b1f" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <style>
    /* ── MD3 dark color tokens ── */
    :root {
      --bg:            #1c1b1f;
      --surface:       #1c1b1f;
      --surf-c:        #211f26;
      --surf-ch:       #2b2930;
      --surf-chh:      #36343b;
      --primary:       #d0bcff;
      --on-primary:    #381e72;
      --primary-c:     #4f378b;
      --on-primary-c:  #eaddff;
      --on-surface:    #e6e1e5;
      --on-surf-var:   #cac4d0;
      --outline:       #938f99;
      --outline-var:   #49454f;
      --error:         #f2b8b5;
      --error-c:       #601410;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--on-surface);
      font-family: 'Roboto', system-ui, -apple-system, sans-serif;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Top App Bar ── */
    .top-bar {
      flex-shrink: 0;
      height: 64px;
      background: var(--surf-c);
      display: flex;
      align-items: center;
      padding: 0 4px 0 16px;
      gap: 4px;
    }
    .top-bar-title {
      flex: 1;
      font-size: 1.375rem;
      font-weight: 400;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .icon-btn {
      position: relative;
      width: 48px; height: 48px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--on-surf-var);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background .2s;
    }
    .icon-btn:active { background: rgba(202,196,208,.12); }
    .server-dot {
      position: absolute;
      top: 9px; right: 9px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--primary-c);
      color: var(--primary);
      font-size: .55rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Error bar ── */
    .error-bar {
      flex-shrink: 0;
      background: var(--error-c);
      color: var(--error);
      padding: 10px 16px;
      font-size: .875rem;
      letter-spacing: .25px;
      display: none;
    }

    /* ── Scroll area ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }

    /* ── Player ── */
    .player-aspect {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }
    .player-aspect > * {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .player-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--surf-ch);
      color: var(--on-surf-var);
    }
    .play-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--surf-chh);
      display: flex; align-items: center; justify-content: center;
    }
    .player-placeholder p { font-size: .875rem; letter-spacing: .25px; }

    /* ── Meta bar ── */
    .meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surf-c);
    }
    .meta-label {
      font-size: .75rem;
      color: var(--on-surf-var);
      letter-spacing: .4px;
    }
    .meta-ep {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: .15px;
      margin-top: 2px;
      min-height: 1.4em;
    }
    .resume-chip {
      flex-shrink: 0;
      background: var(--primary-c);
      color: var(--primary);
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 8px;
    }

    /* ── Chips row ── */
    .chips-row {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--surf-c);
      border-top: 1px solid rgba(255,255,255,.04);
    }
    .chips-row::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      height: 32px;
      padding: 0 16px;
      border-radius: 8px;
      border: 1px solid var(--outline-var);
      background: transparent;
      color: var(--on-surf-var);
      font-size: .875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s, color .15s, border-color .15s;
    }
    .chip.active {
      background: var(--primary-c);
      border-color: transparent;
      color: var(--on-primary-c);
    }

    /* ── Episode list ── */
    .ep-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 8px;
    }
    .ep-header-label {
      font-size: .6875rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--on-surf-var);
    }
    .ep-count-pill {
      background: var(--surf-ch);
      color: var(--primary);
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 12px;
    }

    .ep-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 16px;
      height: 56px;
      cursor: pointer;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .ep-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--on-surface);
      opacity: 0;
      pointer-events: none;
      transition: opacity .1s;
    }
    .ep-item:active::after { opacity: .08; }

    .ep-item.active {
      background: rgba(208,188,255,.08);
    }
    .ep-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 10px; bottom: 10px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--primary);
    }

    .ep-num {
      flex-shrink: 0;
      min-width: 28px;
      text-align: right;
      font-size: .8rem;
      font-weight: 600;
      color: var(--outline);
    }
    .ep-item.active .ep-num { color: var(--primary); }

    .ep-title {
      flex: 1;
      font-size: .9375rem;
      color: var(--on-surface);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ep-item.active .ep-title { color: var(--primary); font-weight: 500; }
    .ep-item.watched .ep-title { color: var(--on-surf-var); }

    .ep-check {
      flex-shrink: 0;
      display: none;
    }
    .ep-item.watched .ep-check { display: block; }

    .ep-divider {
      height: 1px;
      background: rgba(255,255,255,.04);
      margin: 0 16px;
    }

    /* ── Spinner ── */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(208,188,255,.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Bottom nav (MD3) ── */
    .bottom-nav {
      flex-shrink: 0;
      height: calc(80px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--surf-c);
      border-top: 1px solid rgba(255,255,255,.05);
      display: flex;
      align-items: stretch;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--on-surf-var);
      font-family: inherit;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-pill {
      width: 64px; height: 32px;
      border-radius: 16px;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .nav-item.active .nav-pill { background: var(--primary-c); }
    .nav-item.active { color: var(--on-primary-c); }
    .nav-label {
      font-size: .6875rem;
      font-weight: 500;
      letter-spacing: .5px;
    }
    .nav-item.active .nav-label { font-weight: 700; }

    /* ── Server bottom sheet ── */
    .sheet-scrim {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 100;
    }
    .sheet-scrim.open { display: block; }
    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surf-ch);
      border-radius: 28px 28px 0 0;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 101;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.2,0,0,1);
    }
    .sheet-scrim.open .sheet { transform: none; }
    .sheet-handle {
      width: 32px; height: 4px;
      background: var(--outline-var);
      border-radius: 2px;
      margin: 12px auto 20px;
    }
    .sheet-title {
      font-size: .875rem;
      font-weight: 500;
      color: var(--on-surf-var);
      padding: 0 24px 8px;
      letter-spacing: .1px;
    }
    .sheet-option {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      height: 56px;
      cursor: pointer;
      font-size: 1rem;
      font-family: inherit;
      color: var(--on-surface);
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    .sheet-option:active { background: rgba(202,196,208,.08); }
    .radio-outer {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--outline);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color .15s;
    }
    .sheet-option.selected .radio-outer { border-color: var(--primary); }
    .radio-inner {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--primary);
      display: none;
    }
    .sheet-option.selected .radio-inner { display: block; }
  </style>
</head>
<body>

<!-- Top App Bar -->
<div class="top-bar">
  <span class="top-bar-title" id="topbar-title">Anime</span>
  <button class="icon-btn" id="server-btn" style="display:none;" aria-label="Server wählen">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20 13H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1v-6c0-.55-.45-1-1-1zm-2 5c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm0-10H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1V9c0-.55-.45-1-1-1zm-2 5c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm2-14H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1V1c0-.55-.45-1-1-1zm-2 5c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/>
    </svg>
    <span class="server-dot" id="server-dot">1</span>
  </button>
</div>

<!-- Error bar -->
<div class="error-bar" id="error-bar"></div>

<!-- Scrollable content -->
<div class="scroll-area" id="scroll-area">

  <!-- Player -->
  <div class="player-aspect">
    <div class="player-placeholder" id="placeholder">
      <div class="play-circle">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor" style="margin-left:4px">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </div>
      <p>Episode auswählen</p>
    </div>
    <iframe id="player-frame" allowfullscreen allow="autoplay; fullscreen" style="display:none;"></iframe>
  </div>

  <!-- Meta bar -->
  <div class="meta-bar">
    <div>
      <div class="meta-label" id="meta-anime">–</div>
      <div class="meta-ep" id="meta-ep"></div>
    </div>
    <span class="resume-chip" id="resume-badge" style="display:none;">Fortgesetzt</span>
  </div>

  <!-- Season chips -->
  <div class="chips-row" id="season-chips" style="display:none;"></div>

  <!-- Episode list -->
  <div class="ep-header">
    <span class="ep-header-label">Episoden</span>
    <span class="ep-count-pill" id="ep-count">–</span>
  </div>
  <div id="ep-list">
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:48px 16px;">
      <div class="spinner"></div>
      <p style="font-size:.875rem;color:var(--on-surf-var);">Lade…</p>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav" id="bottom-nav"></nav>

<!-- Server bottom sheet -->
<div class="sheet-scrim" id="sheet-scrim">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Server auswählen</div>
    <div id="sheet-options"></div>
  </div>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────────
  const CORS  = 'https://cors.eu.org/';
  const STORE = 'anime_progress';

  const ANIME_LIST = [
    {
      id: 'jjk', label: 'Jujutsu Kaisen', short: 'JJK',
      icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg>`,
      seasons: [
        { label: 'Staffel 1', type: 'ajax', slug: 'jujutsu-kaisen-ger-dub',            title: 'Jujutsu Kaisen Dub S1' },
        { label: 'Staffel 2', type: 'ajax', slug: 'jujutsu-kaisen-2nd-season-ger-dub', title: 'Jujutsu Kaisen Dub S2' },
      ],
    },
    {
      id: 'frieren', label: 'Frieren', short: 'Frieren',
      icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25L19 9zm-7.5.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5L17 12l-5.5-2.5z"/></svg>`,
      seasons: [
        { label: 'Staffel 1', type: 'ajax', slug: 'sousou-no-frieren-ger-dub',              title: 'Sousou no Frieren Dub S1' },
        { label: 'Staffel 2', type: 'link', slug: 'sousou-no-frieren-2nd-season-ger-dub', linkOffset: 15, episodeCount: 16 },
      ],
    },
    {
      id: 'op', label: 'One Piece', short: 'One Piece',
      icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h10c2.76 0 5-2.24 5-5s-2.24-5-5-5zM7 15c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/></svg>`,
      seasons: [
        { label: 'Ger Sub', type: 'link', slug: 'one-piece-gyojin-tou-hen-ger-sub', linkOffset: -1, episodeCount: 17 },
      ],
    },
  ];

  // ── State ─────────────────────────────────────────────────────────────────────
  let activeAnime   = 0;
  let activeSeason  = 0;
  let activeEpisode = null;
  let activeServer  = 1;
  let episodes      = [];
  let watchedEps    = {};
  let wakeLock      = null;

  // ── Persistence ───────────────────────────────────────────────────────────────
  const progressKey = () => `${ANIME_LIST[activeAnime].id}:${activeSeason}`;

  function loadProgress() {
    try {
      const raw = JSON.parse(localStorage.getItem(STORE) || '{}');
      activeAnime  = raw.anime  ?? 0;
      activeSeason = raw.season ?? 0;
      activeServer = raw.server ?? 1;
      watchedEps   = {};
      for (const [k, v] of Object.entries(raw.watched || {})) watchedEps[k] = new Set(v);
      return raw.episode ?? null;
    } catch { return null; }
  }

  function saveProgress() {
    const watched = {};
    for (const [k, v] of Object.entries(watchedEps)) watched[k] = [...v];
    localStorage.setItem(STORE, JSON.stringify({
      anime: activeAnime, season: activeSeason, episode: activeEpisode, server: activeServer, watched,
    }));
  }

  function markWatched(epNum) {
    const k = progressKey();
    if (!watchedEps[k]) watchedEps[k] = new Set();
    watchedEps[k].add(epNum);
    saveProgress();
    epListEl.querySelector(`[data-ep="${epNum}"]`)?.classList.add('watched');
  }

  // ── Wake Lock ─────────────────────────────────────────────────────────────────
  async function acquireWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(_) {}
  }
  const releaseWakeLock = () => { wakeLock?.release(); wakeLock = null; };

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) releaseWakeLock();
    else if (activeEpisode && playerFrame.style.display !== 'none') acquireWakeLock();
  });

  // ── Media Session ─────────────────────────────────────────────────────────────
  function updateMediaSession(epNum) {
    if (!('mediaSession' in navigator)) return;
    const anime  = ANIME_LIST[activeAnime];
    const season = anime.seasons[activeSeason];
    navigator.mediaSession.metadata = new MediaMetadata({
      title:   `Folge ${epNum}`,
      artist:  anime.label + (anime.seasons.length > 1 ? ' · ' + season.label : ''),
      artwork: [{ src: 'icons/icon-512.png', sizes: '512x512', type: 'image/png' }],
    });
    navigator.mediaSession.setActionHandler('previoustrack',
      epNum > 1             ? () => selectEpisode(epNum - 1) : null);
    navigator.mediaSession.setActionHandler('nexttrack',
      epNum < episodes.length ? () => selectEpisode(epNum + 1) : null);
  }

  // ── DOM refs ──────────────────────────────────────────────────────────────────
  const topbarTitle  = document.getElementById('topbar-title');
  const serverBtn    = document.getElementById('server-btn');
  const serverDot    = document.getElementById('server-dot');
  const sheetScrim   = document.getElementById('sheet-scrim');
  const sheetOptions = document.getElementById('sheet-options');
  const scrollArea   = document.getElementById('scroll-area');
  const epListEl     = document.getElementById('ep-list');
  const epCountEl    = document.getElementById('ep-count');
  const playerFrame  = document.getElementById('player-frame');
  const placeholder  = document.getElementById('placeholder');
  const metaAnime    = document.getElementById('meta-anime');
  const metaEp       = document.getElementById('meta-ep');
  const resumeBadge  = document.getElementById('resume-badge');
  const errorBar     = document.getElementById('error-bar');
  const bottomNav    = document.getElementById('bottom-nav');
  const seasonChips  = document.getElementById('season-chips');

  const showError = msg => { errorBar.textContent = msg; errorBar.style.display = 'block'; };
  const hideError = ()  => { errorBar.style.display = 'none'; };

  // ── Fetch ─────────────────────────────────────────────────────────────────────
  const proxyGet = url => fetch(CORS + url).then(r => r.text());

  // ── Server sheet ──────────────────────────────────────────────────────────────
  function openServerSheet() {
    sheetOptions.innerHTML = [1, 2, 3, 4].map(n => `
      <button class="sheet-option ${n === activeServer ? 'selected' : ''}" data-n="${n}">
        <div class="radio-outer"><div class="radio-inner"></div></div>
        Server ${n}
      </button>
    `).join('');
    sheetOptions.querySelectorAll('.sheet-option').forEach(btn => {
      btn.addEventListener('click', () => {
        const n = parseInt(btn.dataset.n);
        closeServerSheet();
        if (n === activeServer) return;
        activeServer = n;
        serverDot.textContent = n;
        saveProgress();
        const prev = activeEpisode;
        loadSeason(activeSeason).then(() => { if (prev) selectEpisode(prev); });
      });
    });
    sheetScrim.classList.add('open');
  }
  const closeServerSheet = () => sheetScrim.classList.remove('open');

  serverBtn.addEventListener('click', openServerSheet);
  sheetScrim.addEventListener('click', e => { if (e.target === sheetScrim) closeServerSheet(); });

  // ── Bottom nav ────────────────────────────────────────────────────────────────
  function buildBottomNav() {
    bottomNav.innerHTML = ANIME_LIST.map((a, i) => `
      <button class="nav-item ${i === activeAnime ? 'active' : ''}" data-idx="${i}">
        <div class="nav-pill">${a.icon}</div>
        <span class="nav-label">${a.short}</span>
      </button>
    `).join('');
    bottomNav.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        if (idx === activeAnime) return;
        activeAnime   = idx;
        activeSeason  = 0;
        activeEpisode = null;
        saveProgress();
        bottomNav.querySelectorAll('.nav-item').forEach((b, i) => b.classList.toggle('active', i === idx));
        buildSeasonChips();
        loadSeason(0);
      });
    });
  }

  // ── Season chips ──────────────────────────────────────────────────────────────
  function buildSeasonChips() {
    const anime   = ANIME_LIST[activeAnime];
    const seasons = anime.seasons;
    const isAjax  = seasons[activeSeason]?.type === 'ajax';

    topbarTitle.textContent       = anime.label;
    serverBtn.style.display       = isAjax ? 'flex' : 'none';
    serverDot.textContent         = activeServer;
    seasonChips.style.display     = seasons.length > 1 ? 'flex' : 'none';

    if (seasons.length <= 1) return;

    seasonChips.innerHTML = seasons.map((s, i) => `
      <button class="chip ${i === activeSeason ? 'active' : ''}" data-idx="${i}">${s.label}</button>
    `).join('');
    seasonChips.querySelectorAll('.chip').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        if (idx === activeSeason) return;
        activeSeason  = idx;
        activeEpisode = null;
        saveProgress();
        seasonChips.querySelectorAll('.chip').forEach(b => b.classList.toggle('active', +b.dataset.idx === idx));
        serverBtn.style.display = ANIME_LIST[activeAnime].seasons[idx]?.type === 'ajax' ? 'flex' : 'none';
        loadSeason(idx);
      });
    });
  }

  // ── Load season ───────────────────────────────────────────────────────────────
  async function loadSeason(seasonIdx, resumeEp = null) {
    const anime  = ANIME_LIST[activeAnime];
    const season = anime.seasons[seasonIdx];
    activeSeason = seasonIdx;
    hideError();

    epListEl.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:48px 16px;">
        <div class="spinner"></div>
        <p style="font-size:.875rem;color:var(--on-surf-var);">Lade…</p>
      </div>`;
    epCountEl.textContent = '–';
    metaAnime.textContent = anime.label + (anime.seasons.length > 1 ? ' · ' + season.label : '');
    metaEp.textContent    = '';
    playerFrame.style.display   = 'none';
    placeholder.style.display   = 'flex';
    placeholder.innerHTML = `
      <div class="play-circle">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor" style="margin-left:4px">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </div>
      <p>Episode auswählen</p>`;

    try {
      if (season.type === 'ajax') {
        await loadAjaxEpisodes(season, resumeEp);
      } else {
        loadLinkEpisodes(season, resumeEp);
      }
    } catch (e) {
      showError('Episoden konnten nicht geladen werden: ' + e.message);
      epListEl.innerHTML = `<p style="padding:16px;color:var(--on-surf-var);font-size:.875rem;">Fehler beim Laden.</p>`;
    }
  }

  async function loadAjaxEpisodes(season, resumeEp) {
    const fileUrl = `https://www.animetoast.cc/wp-content/uploads/iframe-data/${encodeURIComponent(season.title)}-server${activeServer}.txt`;
    const text = await proxyGet(fileUrl);
    const urls = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
    if (!urls.length) throw new Error('Keine Episoden gefunden');
    episodes = urls.map((url, i) => ({ number: i + 1, title: `Episode ${i + 1}`, url }));
    renderEpisodeList();
    if (resumeEp) selectEpisode(resumeEp, true);
  }

  function loadLinkEpisodes(season, resumeEp) {
    episodes = Array.from({ length: season.episodeCount }, (_, i) => ({
      number: i + 1, title: `Episode ${i + 1}`,
    }));
    renderEpisodeList();
    if (resumeEp) selectEpisode(resumeEp, true);
  }

  // ── Render list ───────────────────────────────────────────────────────────────
  function renderEpisodeList() {
    const watched = watchedEps[progressKey()] || new Set();
    epCountEl.textContent = episodes.length;
    epListEl.innerHTML = episodes.map((ep, i) => `
      <div class="ep-item ${watched.has(ep.number) ? 'watched' : ''}" data-ep="${ep.number}">
        <span class="ep-num">${String(ep.number).padStart(2, '0')}</span>
        <span class="ep-title">${ep.title}</span>
        <svg class="ep-check" width="18" height="18" viewBox="0 0 24 24" fill="var(--primary)">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
      </div>
      ${i < episodes.length - 1 ? '<div class="ep-divider"></div>' : ''}
    `).join('');
    epListEl.querySelectorAll('.ep-item').forEach(el => {
      el.addEventListener('click', () => selectEpisode(parseInt(el.dataset.ep)));
    });
  }

  // ── Select episode ────────────────────────────────────────────────────────────
  async function selectEpisode(epNum, isResume = false) {
    const season = ANIME_LIST[activeAnime].seasons[activeSeason];
    activeEpisode = epNum;
    saveProgress();
    hideError();

    epListEl.querySelectorAll('.ep-item').forEach(el =>
      el.classList.toggle('active', parseInt(el.dataset.ep) === epNum)
    );
    epListEl.querySelector('.ep-item.active')?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    playerFrame.style.display  = 'none';
    placeholder.style.display  = 'flex';
    placeholder.innerHTML = `<div class="spinner"></div><p style="font-size:.875rem;">Lade Folge ${epNum}…</p>`;
    metaEp.textContent = `Folge ${epNum}`;
    resumeBadge.style.display = isResume ? 'inline' : 'none';
    scrollArea.scrollTo({ top: 0, behavior: 'smooth' });

    try {
      let embedUrl;
      if (season.type === 'ajax') {
        const ep = episodes.find(e => e.number === epNum);
        if (!ep?.url) throw new Error('Keine URL');
        embedUrl = ep.url;
        metaEp.textContent = `Folge ${epNum} / ${episodes.length}`;
      } else {
        const linkN  = season.linkOffset + epNum;
        const html   = await proxyGet(`https://www.animetoast.cc/${season.slug}/?link=${linkN}`);
        const iframe = html.match(/<iframe[^>]+src="(https?:\/\/[^"]+)"/i);
        if (iframe) {
          embedUrl = iframe[1];
        } else {
          const voe = html.match(/id="player-embed"[^]*?href="(https?:\/\/voe\.sx\/([^"]+))"/i);
          if (!voe) throw new Error('Kein Embed gefunden');
          embedUrl = `https://voe.sx/e/${voe[2]}`;
        }
        metaEp.textContent = `Folge ${epNum} / ${season.episodeCount}`;
      }

      playerFrame.src = embedUrl;
      playerFrame.style.display  = 'block';
      placeholder.style.display  = 'none';
      acquireWakeLock();
      updateMediaSession(epNum);
      setTimeout(() => markWatched(epNum), 10000);
    } catch (e) {
      showError(`Folge ${epNum} konnte nicht geladen werden: ${e.message}`);
      placeholder.innerHTML = `
        <div class="play-circle">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="var(--error)">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
          </svg>
        </div>
        <p style="font-size:.875rem;">Episode nicht verfügbar</p>`;
      placeholder.style.display = 'flex';
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  const savedEp = loadProgress();
  buildBottomNav();
  buildSeasonChips();
  loadSeason(activeSeason, savedEp);

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
