<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jujutsu Kaisen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0b0f;
      --surface: #13151d;
      --card:    #1a1d27;
      --border:  #252836;
      --accent:  #7c5cbf;
      --accent2: #a97de8;
      --text:    #e8eaf0;
      --muted:   #5a6078;
      --danger:  #ef4444;
      --radius:  8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ───────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .topbar-title {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: .03em;
      background: linear-gradient(90deg, var(--accent2), #d4b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Season tabs in topbar */
    .season-tabs {
      display: flex;
      gap: 6px;
    }
    .season-tab {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: .78rem;
      font-weight: 600;
      transition: all .15s;
    }
    .season-tab:hover { border-color: var(--accent); color: var(--text); }
    .season-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Server picker */
    .server-pick {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .server-pick label { font-size: .75rem; color: var(--muted); }
    .server-pick select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: .78rem;
      cursor: pointer;
    }

    /* ── Main layout: player left, episodes right ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 49px); /* subtract topbar */
    }

    /* ── Player column ─────────────────────────────── */
    .player-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: #000;
    }

    .player-box {
      flex: 1;
      position: relative;
      background: #000;
    }
    .player-box iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
    }
    .player-placeholder {
      position: absolute; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #0a0b0f;
      color: var(--muted);
    }
    .player-placeholder .play-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--card);
      display: flex; align-items: center; justify-content: center;
      opacity: .4;
    }
    .player-placeholder p { font-size: .9rem; }

    /* meta bar below player */
    .player-meta-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }
    .meta-left { display: flex; align-items: center; gap: 14px; }
    .meta-series { font-size: .78rem; color: var(--muted); }
    .meta-ep {
      font-size: .92rem;
      font-weight: 700;
    }
    .resume-badge {
      font-size: .7rem;
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }

    /* ── Episode sidebar ───────────────────────────── */
    .ep-sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .ep-sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
    .ep-sidebar-header span:last-child { color: var(--accent2); }

    .ep-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .ep-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
      position: relative;
    }
    .ep-item:last-child { border-bottom: none; }
    .ep-item:hover { background: var(--card); }
    .ep-item.active {
      background: #1e1535;
      border-left: 2px solid var(--accent2);
    }
    .ep-item.watched .ep-num { color: var(--muted); }
    .ep-item.watched::after {
      content: '✓';
      position: absolute;
      right: 14px;
      font-size: .7rem;
      color: var(--accent);
      font-weight: 700;
    }
    .ep-num {
      font-size: .72rem;
      font-weight: 700;
      color: var(--accent2);
      min-width: 24px;
    }
    .ep-title { font-size: .83rem; line-height: 1.35; }

    /* ── Spinner ───────────────────────────────────── */
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error bar ─────────────────────────────────── */
    .error-bar {
      background: #1f0a0a;
      border-bottom: 1px solid var(--danger);
      color: #fca5a5;
      padding: 8px 18px;
      font-size: .8rem;
      display: none;
      flex-shrink: 0;
    }

    /* ── Responsive ────────────────────────────────── */
    @media (max-width: 700px) {
      .layout { flex-direction: column; height: auto; }
      .player-col { height: 56vw; min-height: 200px; }
      .ep-sidebar { width: 100%; height: 260px; border-left: none; border-top: 1px solid var(--border); }
      .topbar { flex-wrap: wrap; gap: 8px; }
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <span class="topbar-title">呪術廻戦 · Jujutsu Kaisen</span>
  <div class="topbar-right">
    <div class="season-tabs" id="season-tabs"></div>
    <div class="server-pick">
      <label for="server-select">Server</label>
      <select id="server-select">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
    </div>
  </div>
</div>

<!-- Error bar -->
<div class="error-bar" id="error-bar"></div>

<!-- Main layout -->
<div class="layout">

  <!-- Player -->
  <div class="player-col">
    <div class="player-box">
      <div class="player-placeholder" id="placeholder">
        <div class="play-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <p>Episode auswählen</p>
      </div>
      <iframe id="player-frame" allowfullscreen style="display:none;"></iframe>
    </div>
    <div class="player-meta-bar">
      <div class="meta-left">
        <div>
          <div class="meta-series" id="meta-series">–</div>
          <div class="meta-ep" id="meta-ep"></div>
        </div>
        <span class="resume-badge" id="resume-badge" style="display:none;">Fortgesetzt</span>
      </div>
    </div>
  </div>

  <!-- Episode sidebar -->
  <div class="ep-sidebar">
    <div class="ep-sidebar-header">
      <span>Episoden</span>
      <span id="ep-count">–</span>
    </div>
    <div class="ep-list" id="ep-list">
      <div style="padding:32px;text-align:center;">
        <div class="spinner" style="margin:0 auto 12px;"></div>
        <p style="font-size:.8rem;color:var(--muted);">Lade…</p>
      </div>
    </div>
  </div>

</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const CORS_PROXY = 'https://corsproxy.io/?url=';
  const AJAX_URL   = 'https://www.animetoast.cc/wp-admin/admin-ajax.php';
  const STORAGE_KEY = 'jjk_progress'; // { seriesIdx, episode }

  const SERIES = [
    { label: 'Staffel 1', slug: 'jujutsu-kaisen-ger-dub',            title: 'Jujutsu Kaisen Dub S1' },
    { label: 'Staffel 2', slug: 'jujutsu-kaisen-2nd-season-ger-dub', title: 'Jujutsu Kaisen Dub S2' },
  ];

  // ── State ────────────────────────────────────────────────────────────────
  let nonce         = null;
  let activeSeries  = 0;
  let activeEpisode = null;
  let episodes      = [];
  let watchedEps    = {};   // { "0": Set([1,2,3...]), "1": Set([...]) }

  // ── Persistence ──────────────────────────────────────────────────────────
  function loadProgress() {
    try {
      const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      activeSeries = raw.seriesIdx ?? 0;
      // Rebuild watched sets
      watchedEps = {};
      for (const [k, v] of Object.entries(raw.watched || {})) {
        watchedEps[k] = new Set(v);
      }
      return raw.episode ?? null;
    } catch { return null; }
  }

  function saveProgress() {
    const watched = {};
    for (const [k, v] of Object.entries(watchedEps)) {
      watched[k] = [...v];
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      seriesIdx: activeSeries,
      episode:   activeEpisode,
      watched,
    }));
  }

  function markWatched(seriesIdx, epNum) {
    if (!watchedEps[seriesIdx]) watchedEps[seriesIdx] = new Set();
    watchedEps[seriesIdx].add(epNum);
    saveProgress();
    // Update checkmark in list
    const el = epList.querySelector(`[data-ep="${epNum}"]`);
    if (el) el.classList.add('watched');
  }

  // ── DOM refs ─────────────────────────────────────────────────────────────
  const seasonTabs   = document.getElementById('season-tabs');
  const epList       = document.getElementById('ep-list');
  const epCount      = document.getElementById('ep-count');
  const playerFrame  = document.getElementById('player-frame');
  const placeholder  = document.getElementById('placeholder');
  const metaSeries   = document.getElementById('meta-series');
  const metaEp       = document.getElementById('meta-ep');
  const resumeBadge  = document.getElementById('resume-badge');
  const serverSelect = document.getElementById('server-select');
  const errorBar     = document.getElementById('error-bar');

  // ── Helpers ──────────────────────────────────────────────────────────────
  function showError(msg) { errorBar.textContent = msg; errorBar.style.display = 'block'; }
  function hideError()    { errorBar.style.display = 'none'; }

  function proxyPost(url, body) {
    return fetch(CORS_PROXY + encodeURIComponent(url), {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body,
    }).then(r => r.json());
  }

  function proxyGet(url) {
    return fetch(CORS_PROXY + encodeURIComponent(url)).then(r => r.text());
  }

  async function fetchNonce(slug) {
    const html = await proxyGet(`https://www.animetoast.cc/${slug}/`);
    const m = html.match(/"nonce":"([^"]+)"/);
    if (!m) throw new Error('Nonce nicht gefunden');
    return m[1];
  }

  // ── Season tabs ──────────────────────────────────────────────────────────
  function buildSeasonTabs() {
    seasonTabs.innerHTML = SERIES.map((s, i) => `
      <button class="season-tab ${i === activeSeries ? 'active' : ''}" data-idx="${i}">${s.label}</button>
    `).join('');

    seasonTabs.querySelectorAll('.season-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        if (idx === activeSeries) return;
        seasonTabs.querySelectorAll('.season-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSeries = idx;
        nonce = null;
        saveProgress();
        loadEpisodes(idx);
      });
    });
  }

  // ── Load episode list ────────────────────────────────────────────────────
  async function loadEpisodes(seriesIdx, resumeEp = null) {
    const s = SERIES[seriesIdx];
    hideError();

    epList.innerHTML = `
      <div style="padding:32px;text-align:center;">
        <div class="spinner" style="margin:0 auto 12px;"></div>
        <p style="font-size:.8rem;color:var(--muted);">Lade…</p>
      </div>`;
    epCount.textContent = '–';
    metaSeries.textContent = s.label;
    metaEp.textContent = '';

    try {
      if (!nonce) nonce = await fetchNonce(s.slug);
      const data = await proxyPost(AJAX_URL,
        `action=get_episode_data&title=${encodeURIComponent(s.title)}&server=${serverSelect.value}&nonce=${nonce}`
      );
      if (!data.success) throw new Error(data.data || 'Fehler');

      episodes = data.data.episodes;
      renderEpisodeList(seriesIdx);

      if (resumeEp) {
        selectEpisode(resumeEp, true);
      }
    } catch (e) {
      showError(`Episoden konnten nicht geladen werden: ${e.message}`);
      epList.innerHTML = `<p style="padding:16px;color:var(--muted);font-size:.82rem;">Fehler beim Laden.</p>`;
    }
  }

  // ── Render episodes ──────────────────────────────────────────────────────
  function renderEpisodeList(seriesIdx) {
    const watched = watchedEps[seriesIdx] || new Set();
    epCount.textContent = episodes.length;
    epList.innerHTML = episodes.map(ep => `
      <div class="ep-item ${watched.has(ep.number) ? 'watched' : ''}" data-ep="${ep.number}">
        <span class="ep-num">${String(ep.number).padStart(2, '0')}</span>
        <span class="ep-title">${ep.title}</span>
      </div>
    `).join('');

    epList.querySelectorAll('.ep-item').forEach(el => {
      el.addEventListener('click', () => selectEpisode(parseInt(el.dataset.ep), false));
    });
  }

  // ── Select & play episode ────────────────────────────────────────────────
  async function selectEpisode(epNum, isResume = false) {
    const s = SERIES[activeSeries];
    hideError();
    activeEpisode = epNum;
    saveProgress();

    // Highlight
    epList.querySelectorAll('.ep-item').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.ep) === epNum);
    });
    const activeEl = epList.querySelector('.ep-item.active');
    if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    // Player loading state
    playerFrame.style.display = 'none';
    placeholder.style.display = 'flex';
    placeholder.innerHTML = `<div class="spinner"></div><p>Lade Folge ${epNum}…</p>`;
    metaEp.textContent = `Folge ${epNum}`;
    resumeBadge.style.display = isResume ? 'inline' : 'none';

    try {
      const data = await proxyPost(AJAX_URL,
        `action=get_episode_data&title=${encodeURIComponent(s.title)}&server=${serverSelect.value}&episode=${epNum}&nonce=${nonce}`
      );
      if (!data.success || !data.data.url) throw new Error(data.data || 'Keine URL');

      playerFrame.src = data.data.url;
      playerFrame.style.display = 'block';
      placeholder.style.display = 'none';
      metaEp.textContent = `Folge ${epNum} / ${data.data.total || episodes.length}`;

      // Mark as watched after a moment
      setTimeout(() => markWatched(activeSeries, epNum), 10000);

    } catch (e) {
      showError(`Folge ${epNum} konnte nicht geladen werden: ${e.message}`);
      placeholder.innerHTML = `
        <div class="play-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg></div>
        <p>Episode nicht verfügbar</p>`;
      placeholder.style.display = 'flex';
    }
  }

  // ── Server change ────────────────────────────────────────────────────────
  serverSelect.addEventListener('change', () => {
    nonce = null;
    const prev = activeEpisode;
    playerFrame.style.display = 'none';
    placeholder.style.display = 'flex';
    placeholder.innerHTML = `<div class="spinner"></div><p>Wechsle Server…</p>`;
    loadEpisodes(activeSeries).then(() => {
      if (prev) selectEpisode(prev);
    });
  });

  // ── Init ─────────────────────────────────────────────────────────────────
  const savedEp = loadProgress();
  buildSeasonTabs();
  loadEpisodes(activeSeries, savedEp);
</script>
</body>
</html>
